services:
  php:
    image: yiisoftware/yii2-php:8.5-fpm-nginx
    volumes:
      - ~/.composer-docker/cache:/root/.composer/cache:delegated
      - ./:/app:delegated
    ports:
      - '8000:80'
  mysql:
    image: mysql:8.0.45-debian
    ports:
      - '9000:3306'
    environment:
      - MYSQL_ROOT_PASSWORD=root
